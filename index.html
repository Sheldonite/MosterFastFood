<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boss Fight</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260428-1" />
  </head>
  <body>
    <div id="menuOverlay" class="menu-overlay">
      <section id="mainMenu" class="menu-screen active" aria-label="Main menu">
        <h1>Boss Fight</h1>
        <div class="menu-actions">
          <button id="singlePlayerButton" type="button">Single Player</button>
          <button id="multiplayerButton" type="button">Multiplayer</button>
        </div>
      </section>

      <section id="multiplayerMenu" class="menu-screen" aria-label="Multiplayer rooms">
        <div class="menu-head">
          <h1>Multiplayer</h1>
          <button id="backToMainButton" type="button">Back</button>
        </div>
        <div class="lobby-form">
          <label>
            <span>Name</span>
            <input id="playerNameInput" maxlength="18" value="Player" />
          </label>
          <label>
            <span>Room</span>
            <input id="roomNameInput" maxlength="26" value="Boss Room" />
          </label>
          <button id="createRoomButton" type="button">Create Room</button>
          <button id="refreshRoomsButton" type="button">Refresh</button>
        </div>
        <div id="roomList" class="room-list"></div>
        <p id="multiplayerStatus" class="menu-status">Choose Multiplayer to connect.</p>
      </section>

      <section id="roomLobby" class="menu-screen" aria-label="Room lobby">
        <div class="menu-head">
          <h1 id="lobbyTitle">Lobby</h1>
          <button id="leaveRoomButton" type="button">Leave</button>
        </div>
        <div id="lobbyPlayers" class="lobby-players"></div>
        <div id="lobbyBossSelector" class="lobby-bosses">
          <button class="choice selected" type="button" data-boss="cola"><span>Big Cola</span><small>Boss</small></button>
          <button class="choice" type="button" data-boss="burger"><span>Big Burger</span><small>Boss</small></button>
          <button class="choice" type="button" data-boss="fries"><span>Curly Fries</span><small>Boss</small></button>
          <button class="choice" type="button" data-boss="trio"><span>Condiment Trio</span><small>Boss</small></button>
          <button class="choice" type="button" data-boss="shake"><span>Peanut Buster Shake</span><small>Boss</small></button>
          <button class="choice" type="button" data-boss="nacho"><span>Nacho Libre</span><small>Boss</small></button>
          <button class="choice" type="button" data-boss="pizza"><span>Pizza Phantom</span><small>Boss</small></button>
          <button class="choice locked" type="button" data-boss="taco" disabled aria-disabled="true"><span>Taco Titan</span><small>Locked</small></button>
          <button class="choice" type="button" data-boss="donut"><span>Donut Donald</span><small>Boss</small></button>
          <button class="choice locked" type="button" data-boss="sushi" disabled aria-disabled="true"><span>Sushi Serpent</span><small>Locked</small></button>
        </div>
        <div class="menu-actions row">
          <button id="readyButton" type="button">Ready</button>
          <button id="startRoomButton" type="button">Start Fight</button>
        </div>
        <p id="lobbyStatus" class="menu-status">Waiting in lobby.</p>
      </section>
    </div>

    <main class="shell">
      <section class="game-wrap" aria-label="Boss arena game">
        <canvas id="game" width="1280" height="720"></canvas>
        <div class="topbar">
          <div>
            <strong>Boss Fight</strong>
            <span id="statusText">Gear up, use WASD to enter the arena, then click to shoot.</span>
          </div>
          <button id="potionButton" type="button" title="Drink potion (F)" data-tooltip="Press F to use potion">Potion</button>
          <button id="resetButton" type="button" title="Reset fight">Reset Fight</button>
        </div>
        <div id="floatText" class="float-text" aria-live="polite"></div>
        <div id="deathScreen" class="death-screen" aria-live="assertive" hidden>
          <div class="death-title">You're Stuffed</div>
          <button id="deathResetButton" class="death-reset" type="button">Reset</button>
        </div>
      </section>

      <aside class="hud" aria-label="Character information">
        <section class="panel">
          <div class="portrait-row">
            <div class="portrait" aria-hidden="true"></div>
            <div>
              <h1>Rook</h1>
              <p><span id="roomText">Starter Room</span></p>
            </div>
          </div>
          <div class="meters">
            <div class="meter">
              <div class="meter-label"><span>Health</span><span id="hpText">30/30</span></div>
              <div class="meter-track"><div id="hpBar" class="meter-fill hp"></div></div>
            </div>
            <div class="meter">
              <div class="meter-label"><span>Boss</span><span id="bossHpText">600/600</span></div>
              <div class="meter-track"><div id="bossHpBar" class="meter-fill boss"></div></div>
            </div>
          </div>
        </section>

        <section class="panel compact">
          <h2>Build</h2>
          <div id="buildPanel" class="stat-grid"></div>
        </section>

        <section class="panel compact">
          <h2>Co-op</h2>
          <div class="coop-row">
            <span id="coopStatus">Solo</span>
            <strong id="coopCount">1</strong>
          </div>
        </section>

        <section class="panel compact">
          <h2>Boss Test</h2>
          <div id="bossSelector" class="choice-list">
            <button class="choice selected" type="button" data-boss="cola"><span>Big Cola</span><small>Test</small></button>
            <button class="choice" type="button" data-boss="burger"><span>Big Burger</span><small>Test</small></button>
            <button class="choice" type="button" data-boss="fries"><span>Curly Fries</span><small>Test</small></button>
            <button class="choice" type="button" data-boss="trio"><span>Condiment Trio</span><small>Test</small></button>
            <button class="choice" type="button" data-boss="sauce"><span>Special Sauce</span><small>Test</small></button>
            <button class="choice" type="button" data-boss="shake"><span>Peanut Buster Shake</span><small>Test</small></button>
            <button class="choice" type="button" data-boss="nacho"><span>Nacho Libre</span><small>Test</small></button>
            <button class="choice" type="button" data-boss="pizza"><span>Pizza Phantom</span><small>Test</small></button>
            <button class="choice locked" type="button" data-boss="taco" disabled aria-disabled="true"><span>Taco Titan</span><small>Locked</small></button>
            <button class="choice" type="button" data-boss="donut"><span>Donut Donald</span><small>Test</small></button>
            <button class="choice locked" type="button" data-boss="sushi" disabled aria-disabled="true"><span>Sushi Serpent</span><small>Locked</small></button>
          </div>
        </section>

      </aside>
    </main>

    <script src="./src/game.js?v=20260430-bosslocks1"></script>
  </body>
</html>
